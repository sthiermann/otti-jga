<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1126"/>
      <stop offset="1" stop-color="#070910"/>
    </linearGradient>
    <radialGradient id="g1" cx="0.2" cy="0.16" r="0.9">
      <stop offset="0" stop-color="#ff2e88" stop-opacity="0.6"/>
      <stop offset="0.6" stop-color="#ff2e88" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="0.86" cy="0.9" r="0.85">
      <stop offset="0" stop-color="#1fe6cf" stop-opacity="0.42"/>
      <stop offset="0.6" stop-color="#1fe6cf" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="0.9" cy="0.12" r="0.7">
      <stop offset="0" stop-color="#ec1d3a" stop-opacity="0.4"/>
      <stop offset="0.6" stop-color="#ec1d3a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#ffd96f"/>
      <stop offset="1" stop-color="#ff9b3d"/>
    </linearGradient>
    <filter id="sh" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#g1)"/>
  <rect width="512" height="512" fill="url(#g2)"/>
  <rect width="512" height="512" fill="url(#g3)"/>

  <!-- confetti specks -->
  <g opacity="0.95">
    <rect x="96" y="120" width="20" height="26" rx="4" fill="#ff2e88" transform="rotate(-18 106 133)"/>
    <rect x="402" y="150" width="18" height="24" rx="4" fill="#1fe6cf" transform="rotate(24 411 162)"/>
    <rect x="120" y="372" width="18" height="24" rx="4" fill="#b6f24a" transform="rotate(12 129 384)"/>
    <rect x="392" y="372" width="20" height="26" rx="4" fill="#ffffff" transform="rotate(-22 402 385)" opacity="0.9"/>
    <circle cx="78" cy="270" r="9" fill="#ffce47"/>
    <circle cx="438" cy="266" r="8" fill="#ff2e88"/>
  </g>

  <!-- festival letter tile -->
  <g filter="url(#sh)">
    <rect x="156" y="132" width="200" height="244" rx="42" fill="url(#tile)"/>
  </g>
  <rect x="236" y="156" width="40" height="11" rx="5.5" fill="#000000" opacity="0.18"/>
  <!-- big "O" for Otti, drawn as a ring (no font dependency) -->
  <circle cx="256" cy="262" r="66" fill="none" stroke="#16121f" stroke-width="40"/>
</svg>
